<!DOCTYPE html>
<html>
<head>
    {{ ga_script|safe }}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container-fluid px-3 py-2">
    <script src="{{ url_for('static', filename='js/stl_viewer.min.js') }}"></script>
    <div class="progress my-2" id="pbtotal_wrapper" style="width:100%">
        <div class="progress-bar progress-bar-striped progress-bar-animated" id="pbtotal"
             role="progressbar" style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <h5 id="working" class="text-muted my-2">Preparing for preview, please be patient ...</h5>
    <div id="stl_cont" style="height:90vh;"></div>

    <script id="stl-viewer-config" type="application/json">
    {
        "models": {{ models|safe }},
        "center_models": {{ center_models }}
    }
    </script>
    
    <script>
        function load_prog(load_status, load_session){
            let loaded = 0;
            let total = 0;
            Object.keys(load_status).forEach(function(model_id)
            {
                if (load_status[model_id].load_session == load_session){
                    loaded += load_status[model_id].loaded;
                    total += load_status[model_id].total;
                }
            });
            document.getElementById("pbtotal").style.width = Math.round(loaded/total*100) + '%';
        }
    
        // Parse configuration from JSON
        var config = JSON.parse(document.getElementById('stl-viewer-config').textContent);
        
        var stl_viewer = new StlViewer(
            document.getElementById("stl_cont"),
            {
                loading_progress_callback: load_prog,
                all_loaded_callback: function(){
                    document.getElementById("pbtotal_wrapper").style.display='none';
                    document.getElementById("working").innerHTML = "Model Previewer: Zoom with mouse wheel, rotate with left mouse drag, pan with right mouse drag";
                },
                models: config.models,
                load_three_files: "/static/js/",
                center_models: config.center_models
            }
        );
    </script>

    <div class="mt-2">
        <form action="{{ zip_url }}" method="GET" enctype="multipart/form-data">
            <input type="submit" class="btn btn-primary" value="Download zip File"
                onclick="gtag('event', 'Click', {'event_category':'Download', 'event_label':'preview_dl', 'value':'1'})"
                title="zip file contains a log file, the geotiff of the processed area and the 3D model file (stl/obj) for each tile">
        </form>
    </div>
</div><!-- /container-fluid -->

</body>
</html>
