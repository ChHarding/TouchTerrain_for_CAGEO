name: CI

on:
  push:
    branches: [ main, master, feature/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gdal gdal-bin libgdal-dev

      - name: Install Python dependencies (excluding GDAL)
        run: |
          python -m pip install --upgrade pip
          # Install all dependencies except GDAL
          grep -v "^gdal" requirements.txt > requirements_no_gdal.txt
          pip install -r requirements_no_gdal.txt
          pip install pytest pytest-cov ruff

      - name: Symlink system GDAL to venv
        run: |
          GDAL_SITE_PACKAGES=$(python3 -c "import sys; print([p for p in sys.path if 'dist-packages' in p][0])")
          VENV_SITE_PACKAGES=$(python -c "import sys; print(sys.path[-1])")
          echo "System GDAL at: $GDAL_SITE_PACKAGES"
          echo "Venv site-packages at: $VENV_SITE_PACKAGES"
          ln -sf $GDAL_SITE_PACKAGES/osgeo $VENV_SITE_PACKAGES/osgeo
          ln -sf $GDAL_SITE_PACKAGES/GDAL-*.egg-info $VENV_SITE_PACKAGES/ 2>/dev/null || true

      - name: Verify GDAL installation
        run: |
          python -c "from osgeo import gdal; print(f'GDAL version: {gdal.__version__}')"

      - name: Run ruff (lint)
        run: |
          ruff check . --exit-zero

      - name: Run tests
        run: |
          pytest -q -m "not earth_engine and not slow"
